<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select>
        <option value="">Select a City</option>
        <option value="">Los Angeles</option>
        <option value="">Sydney</option>
        <option value="">Tokyo</option>
        <option value="">Paris</option>
      </select>
      <div class="cities">
        <h2>Los Angeles</h2>
        <div class="date">April 13, 2026</div>
        <div class="time">1:48:15 AM</div>
      </div>

      <div class="cities">
        <h3>Sydney</h3>
        <div class="date">April 13, 2026</div>
        <div class="time">1:48:15 AM</div>
      </div>
    </div>
    <footer>
      This project is coded by Connie Mutua and is

      <a href="https://github.com/pink-clarinet65/world-clock" target="_blank"
        >open-sourced on GitHub</a
      >

      and

      <a href="https://myworld-clock-app.netlify.app/" target="_blank"
        >hosted on Netlify</a
      >.
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
